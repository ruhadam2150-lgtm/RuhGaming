<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuhGaming</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:15px;
font-size:22px;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#020617;
transition:0.4s;
padding-top:60px;
}

.menu a{
display:block;
padding:12px;
color:white;
text-decoration:none;
}

.menu a:hover{
background:#1e293b;
}

.menuBtn{
position:absolute;
left:15px;
top:15px;
font-size:24px;
cursor:pointer;
}

.open{
left:0;
}

.adminPanel{
display:none;
background:#020617;
padding:20px;
margin:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<span class="menuBtn" onclick="toggleMenu()">☰</span>
RuhGaming
</header>

<div class="menu" id="menu">
<a href="#">Ana Sayfa</a>
<a href="#">Oyunlar</a>
<a href="#">Hakkında</a>
</div>

<h1>Hoşgeldin 🎮</h1>
<p>En iyi oyun sitesi</p>

<h2>Admin Giriş</h2>
<input type="password" id="pass" placeholder="Şifre">
<button onclick="login()">Giriş</button>

<div class="adminPanel" id="admin">
<h3>Admin Panel</h3>
<input placeholder="Kullanıcı adı">
<button>Ban</button>
<button>Kick</button>
<p>OP yetkileri aktif</p>
</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

function login(){
let p=document.getElementById("pass").value;
if(p==="1234"){
document.getElementById("admin").style.display="block";
alert("Admin girişi başarılı");
}else{
alert("Şifre yanlış");
}
}
</script>

</body>
</html>
